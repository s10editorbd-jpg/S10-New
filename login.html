<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S10 Portal Login</title>
<link rel="icon" type="image/png"
        href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQFqhBaNVK_GbQaJqJVUa0Y2succ7kactyGor7iYzggYQ&s">
     <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

body{
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: radial-gradient(circle,
        #00c6ff,
        #2946a4,
        #6a11cb,
        #18df1e,
        #2946a4,
        #00c6ff,
        #df1818
    );

    background-size: 1000% 1000%;
    animation: gradientMove 60s ease infinite;
}

@keyframes gradientMove{
    0%{
        background-position: 0% 0%;
    }
    50%{
        background-position: 100% 100%;
    }
    100%{
        background-position: 0% 0%;
    }
}

        .login-box{

            width:380px;

            background:radial-gradient(circle, #2946a4, #00c6ff, #00c6ff, #ffffff);

            padding:35px;

            border-radius:12px;

            box-shadow:0 10px 25px rgba(0,0,0,.15);

        }

        h2{

            text-align:center;

            margin-bottom:30px;

            color:#00000;

        }

        input{

            width:100%;

            padding:12px;

            margin-bottom:15px;

            border:1px solid #ddd;

            border-radius:8px;

            outline:none;

            font-size:15px;

        }

        button{

            width:100%;

            padding:12px;

            border:none;

            border-radius:8px;

            background:#16a34a;

            color:#fff;

            font-size:16px;

            cursor:pointer;

        }

        button:hover{

            background:#d10a0a;

        }

        #msg{

            margin-top:15px;

            text-align:center;

            color:red;

            font-size:14px;

        }

    </style>

</head>

<body>

<div class="login-box">

<h2>S10 Portal Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button id="loginBtn" onclick="login()">
Login
</button>

<p id="msg"></p>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbx-wNqwK7Ag1bjM2G3Yg1cwiDG45uR7R4d7NGBN2Kmb0SskZJZA-jLIUy3RbaXwbm4H/exec";

if(localStorage.getItem("user")){

    window.location.href="index.html";

}

document.addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        login();

    }

});

function login(){

    let username=document.getElementById("username").value.trim();

    let password=document.getElementById("password").value.trim();

    let msg=document.getElementById("msg");

    let btn=document.getElementById("loginBtn");

    msg.innerHTML="";

    if(username==="" || password===""){

        msg.innerHTML="Please enter Username and Password";

        return;

    }

    btn.innerHTML="Checking...";

    btn.disabled=true;

    fetch(API,{

        method:"POST",

        headers:{

            "Content-Type":"text/plain;charset=utf-8"

        },

        body:JSON.stringify({

            action:"login",

            username:username,

            password:password

        })

    })

    .then(res=>res.json())

    .then(data=>{

        btn.innerHTML="Login";

        btn.disabled=false;

        if(data.success){

            localStorage.setItem("user",data.username);

            localStorage.setItem("role",data.role);

            window.location.href="index.html";

        }else{

            msg.innerHTML=data.message;

        }

    })

.catch(err=>{

    btn.innerHTML="Login";
    btn.disabled=false;

    msg.innerHTML = 
    "Error: " + err.message;

    console.log("LOGIN ERROR:", err);

});

}

</script>

</body>

</html>
